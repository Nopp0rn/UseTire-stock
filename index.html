  window.showFatalError = function(msg){
    function append(){
      var el = document.getElementById('fatal-error');
      if(!el){
        el = document.createElement('div');
        el.id = 'fatal-error';
        el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#dc2626;color:#fff;padding:14px 16px;font-family:sans-serif;font-size:13px;z-index:99999;white-space:pre-wrap;line-height:1.6;max-height:60vh;overflow:auto;';
        document.body.appendChild(el);
      }
      el.textContent += (el.textContent ? '\n' : '') + '⚠️ ' + msg;
    }
    if (document.body) append();
    else document.addEventListener('DOMContentLoaded', append);
  };
  window.addEventListener('error', function(e){
    window.showFatalError('JS Error: ' + (e.message || e.type || 'unknown'));
  }, true);
  window.addEventListener('unhandledrejection', function(e){
    window.showFatalError('Promise Error: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
</script>

</style>
</head>
<body>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

/* ============================================================
   ⚙️ ตั้งค่า Supabase — TireTrack
   ============================================================ */
const SUPABASE_URL = "https://yigveyqcfzkxjzsrlger.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpZ3ZleXFjZnpreGp6c3JsZ2VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjYzMjUsImV4cCI6MjA5NDYwMjMyNX0.5fkhW2ITHwuF2KCLcbY9Eo2E6-eTnuk8B-vTVSMRXbQ";
const BUCKET = "tire-photos";
const TABLE = "tire_lots";
/* ============================================================ */

const BRANCHES = ["003","009","010","012","014","048","050","096","107","143"];

const supa = (SUPABASE_URL && SUPABASE_ANON_KEY)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

/* ---------- helpers ---------- */
const todayStr = () => {
  const d = new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off*60000).toISOString().slice(0,10);
};
const monthKeyOf = (dateStr) => (dateStr || todayStr()).slice(0,7);
const monthThai = (mk) => {
  const months = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  const [y,m] = mk.split("-");
  return months[parseInt(m,10)-1] + " " + (parseInt(y,10)+543);
};
const n = (v) => { const x = parseInt(v,10); return isNaN(x) ? 0 : x; };
const fmt = (v) => (v||0).toLocaleString("th-TH");

const STATUS_LABEL = {
  received:"รับเข้าแล้ว รอแยกดี/เสีย",
  good_pending:"รอผู้รับเหมายางดีคัด",
  bad_pending:"รอผู้รับเหมายางเสียมารับ",
  good_done:"ผู้รับเหมายางดีตัดสินครบแล้ว",
  sold_bad:"ขายให้ผู้รับเหมายางเสียแล้ว",
  no_stock:"ลูกค้านำกลับทั้งหมด (ไม่มีเข้าสต็อก)"
};

function compressImage(file, maxDim = 1280, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round(height*maxDim/width); width = maxDim; }
        else if (height >= width && height > maxDim) { width = Math.round(width*maxDim/height); height = maxDim; }
        const c = document.createElement("canvas");
        c.width = width; c.height = height;
        c.getContext("2d").drawImage(img, 0, 0, width, height);
        c.toBlob(b => b ? resolve(b) : reject(new Error("compress fail")), "image/jpeg", quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ---------- Toast ---------- */
function useToast(){
  const [msg, setMsg] = useState(null);
  const show = useCallback((m)=>{ setMsg(m); setTimeout(()=>setMsg(null), 2600); }, []);
  const node = msg ? <div className="toast">{msg}</div> : null;
  return [show, node];
}

/* ============================================================
   ขั้น 1: รับเข้าสต็อกยางเก่า
   ============================================================ */
function IntakeForm({ onSaved, toast, defaultBranch, lockedBranch }){
  const blank = {
    branch: lockedBranch || defaultBranch || "", record_date: todayStr(), tire_size:"", brand:"",
    qty_total_intake:"", qty_customer_back:""
  };
  const [f, setF] = useState(blank);
  const [files, setFiles] = useState([]);
  const [saving, setSaving] = useState(false);
  const set = (k,v) => setF(p => ({...p, [k]:v}));
  const net = Math.max(0, n(f.qty_total_intake) - n(f.qty_customer_back));

  useEffect(()=>{ if (lockedBranch) set("branch", lockedBranch); }, [lockedBranch]);

  const onPickFiles = (e) => setFiles(Array.from(e.target.files || []).slice(0,4));

  const submit = async () => {
    if (!supa) { toast("ยังไม่ได้ตั้งค่า Supabase"); return; }
    if (!f.branch) { toast("กรุณาเลือกสาขา"); return; }
    if (!f.tire_size.trim()) { toast("กรุณากรอกขนาดยาง"); return; }
    if (n(f.qty_total_intake) <= 0) { toast("กรุณากรอกจำนวนที่รับเข้า"); return; }
    if (n(f.qty_customer_back) > n(f.qty_total_intake)) { toast("จำนวนนำกลับมากกว่าจำนวนที่รับทั้งหมด — กรุณาแก้ตัวเลข"); return; }
    setSaving(true);
    try {
      let photos = [];
      if (files.length){
        for (const file of files){
          const blob = await compressImage(file);
          const path = `${f.branch}/intake_${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
          const { error } = await supa.storage.from(BUCKET).upload(path, blob, { contentType:"image/jpeg" });
          if (error) throw error;
          const { data } = supa.storage.from(BUCKET).getPublicUrl(path);
          photos.push({ url: data.publicUrl, path });
        }
      }
      const row = {
        record_date: f.record_date,
        month_key: monthKeyOf(f.record_date),
        branch: f.branch,
        tire_size: f.tire_size.trim(),
        brand: f.brand.trim(),
        qty_total_intake: n(f.qty_total_intake),
        qty_customer_back: n(f.qty_customer_back),
        qty_received: net,
        status: net > 0 ? "received" : "no_stock",
        intake_photos: photos
      };
      const { error } = await supa.from(TABLE).insert([row]);
      if (error) throw error;
      toast(net > 0 ? "บันทึกรับเข้าสำเร็จ ✓ — ไปแยกดี/เสียได้ที่แท็บถัดไป" : "บันทึกแล้ว ✓ — ลูกค้านำกลับทั้งหมด ไม่มีเข้าสต็อก");
      setF({ ...blank, branch: f.branch, record_date: todayStr() });
      setFiles([]);
      onSaved && onSaved();
    } catch(err){
      console.error(err);
      toast("ผิดพลาด: " + (err.message || "บันทึกไม่สำเร็จ"));
    } finally { setSaving(false); }
  };

  return (
    <div>
      <div className="card">
        <h2>📥 ขั้น 1: รับเข้าสต็อกยางเก่า</h2>

        <label>สาขา <span className="req">*</span> {lockedBranch && <span className="small">🔒 ล็อกอยู่</span>}</label>
        <select value={f.branch} disabled={!!lockedBranch} onChange={e=>set("branch",e.target.value)}>
          <option value="">— เลือกสาขา —</option>
          {BRANCHES.map(b => <option key={b} value={b}>สาขา {b}</option>)}
        </select>

        <label>วันที่บันทึก (อัตโนมัติ)</label>
        <input type="date" value={f.record_date} onChange={e=>set("record_date",e.target.value)} />

        <div className="grid2">
          <div>
            <label>ขนาดยาง <span className="req">*</span></label>
            <input placeholder="เช่น 185/60R15" value={f.tire_size} onChange={e=>set("tire_size",e.target.value)} />
          </div>
          <div>
            <label>ยี่ห้อยาง</label>
            <input placeholder="เช่น Bridgestone" value={f.brand} onChange={e=>set("brand",e.target.value)} />
          </div>
        </div>

        <label>จำนวนยางเก่าที่ลูกค้าเอามาให้ทั้งหมด <span className="req">*</span></label>
        <input type="number" inputMode="numeric" min="0" value={f.qty_total_intake} onChange={e=>set("qty_total_intake",e.target.value)} />
        <div className="small">นับรวมทุกเส้นที่ลูกค้าเอามา ก่อนหักส่วนที่จะนำกลับ</div>

        <label>จำนวนที่ลูกค้านำกลับทันที (ถ้ามี)</label>
        <input type="number" inputMode="numeric" min="0" value={f.qty_customer_back} onChange={e=>set("qty_customer_back",e.target.value)} />
        <div className="small">ต้องไม่เกินจำนวนที่รับทั้งหมดด้านบน</div>

        <label>ถ่ายรูปยางที่รับเข้า (สูงสุด 4 รูป)</label>
        <label className="photo-input">
          📷 {files.length ? `เลือกแล้ว ${files.length} รูป` : "แตะเพื่อถ่าย / เลือกรูป"}
          <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={onPickFiles} />
        </label>
        {files.length>0 && (
          <div className="thumbs">
            {files.map((file,i)=>(<img key={i} src={URL.createObjectURL(file)} alt="" />))}
          </div>
        )}

        {n(f.qty_customer_back) > n(f.qty_total_intake) && n(f.qty_total_intake) > 0 && (
          <div className="note">
            ⚠️ จำนวนนำกลับ ({fmt(n(f.qty_customer_back))}) มากกว่าจำนวนที่รับทั้งหมด ({fmt(n(f.qty_total_intake))}) — แก้ตัวเลขก่อนบันทึก
          </div>
        )}
        {n(f.qty_total_intake) > 0 && n(f.qty_customer_back) <= n(f.qty_total_intake) && (
          <div className="note" style={{background:"#eff6ff", borderColor:"#bfdbfe", color:"#1e40af"}}>
            {net > 0
              ? `จำนวนที่จะเข้าสู่สต็อกยางเก่าจริง = ${fmt(net)} เส้น`
              : "ลูกค้านำกลับทั้งหมด — ไม่มีเข้าสต็อก (ระบบจะบันทึกเก็บไว้เป็นหลักฐานเท่านั้น)"}
          </div>
        )}

        <div style={{marginTop:16}}>
          <button className="btn" disabled={saving} onClick={submit}>
            {saving ? "กำลังบันทึก..." : "บันทึกรับเข้า"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   ขั้น 2: แยกเข้าฝั่งยางดี / ยางเสีย (แยกบางส่วนได้ เช่น ดี 2 เสีย 2)
   ============================================================ */
function SortCard({ lot, reload, toast }){
  const [busy, setBusy] = useState(false);
  const [splitMode, setSplitMode] = useState(false);
  const [goodQty, setGoodQty] = useState("");
  const [badQty, setBadQty] = useState("");

  const sum = n(goodQty) + n(badQty);
  const validSplit = sum === lot.qty_received && (n(goodQty) > 0 || n(badQty) > 0);

  // ไปทางเดียวทั้งหมด (ทางลัด)
  const decideAll = async (side) => {
    setBusy(true);
    try {
      const { error } = await supa.from(TABLE).update({
        side,
        status: side === "good" ? "good_pending" : "bad_pending",
        sorted_at: new Date().toISOString()
      }).eq("id", lot.id);
      if (error) throw error;
      toast(side === "good" ? "เข้าฝั่งยางดีทั้งหมด ✓" : "เข้าฝั่งยางเสียทั้งหมด ✓");
      reload();
    } catch(err){ console.error(err); toast("ผิดพลาด: "+(err.message||"")); }
    finally { setBusy(false); }
  };

  // แยกบางส่วน เช่น ดี 2 เสีย 2
  const confirmSplit = async () => {
    if (!validSplit) { toast(`จำนวนรวมต้องเท่ากับ ${lot.qty_received} เส้น`); return; }
    setBusy(true);
    try {
      const gq = n(goodQty), bq = n(badQty);
      if (gq > 0 && bq > 0){
        // แยกจริง: อัปเดตชุดเดิมเป็นฝั่งดี + สร้างชุดใหม่ฝั่งเสีย
        const { error: e1 } = await supa.from(TABLE).update({
          side: "good", status: "good_pending", qty_received: gq,
          sorted_at: new Date().toISOString()
        }).eq("id", lot.id);
        if (e1) throw e1;
        const { error: e2 } = await supa.from(TABLE).insert([{
          record_date: lot.record_date,
          month_key: lot.month_key,
          branch: lot.branch,
          tire_size: lot.tire_size,
          brand: lot.brand,
          qty_total_intake: bq,
          qty_customer_back: 0,
          qty_received: bq,
          side: "bad",
          status: "bad_pending",
          parent_lot_id: lot.id,
          sorted_at: new Date().toISOString()
        }]);
        if (e2) throw e2;
      } else if (gq > 0){
        await decideAll("good"); return;
      } else {
        await decideAll("bad"); return;
      }
      toast(`แยกแล้ว ✓ — ดี ${fmt(gq)} เส้น · เสีย ${fmt(bq)} เส้น`);
      reload();
    } catch(err){ console.error(err); toast("ผิดพลาด: "+(err.message||"")); }
    finally { setBusy(false); }
  };

  return (
    <div className="lotcard">
      <div className="top">
        <div>
          <div className="size">{lot.tire_size} <span className="small">{lot.brand}</span></div>
          <div className="meta">สาขา {lot.branch} · {lot.record_date}</div>
        </div>
        <span className="status-badge sb-received">รอแยก</span>
      </div>
      <div className="qty">{fmt(lot.qty_received)} เส้น</div>

      {!splitMode ? (
        <>
          <div className="actions">
            <button className="btn-good" disabled={busy} onClick={()=>decideAll("good")}>✅ เข้าฝั่งยางดีทั้งหมด</button>
            <button className="btn-bad" disabled={busy} onClick={()=>decideAll("bad")}>❌ เข้าฝั่งยางเสียทั้งหมด</button>
          </div>
          <button className="linkbtn" style={{width:"100%", marginTop:4}} onClick={()=>setSplitMode(true)}>
            ✂️ แยกบางส่วน (เช่น ดี 2 เสีย 2)
          </button>
        </>
      ) : (
        <>
          <div className="grid2" style={{marginTop:10}}>
            <div>
              <label>จำนวนเข้าฝั่งดี</label>
              <input type="number" inputMode="numeric" min="0" placeholder="0" value={goodQty} onChange={e=>setGoodQty(e.target.value)} />
            </div>
            <div>
              <label>จำนวนเข้าฝั่งเสีย</label>
              <input type="number" inputMode="numeric" min="0" placeholder="0" value={badQty} onChange={e=>setBadQty(e.target.value)} />
            </div>
          </div>
          {sum !== lot.qty_received && (
            <div className="note">⚠️ รวมกันต้องเท่ากับ {fmt(lot.qty_received)} เส้น (ขณะนี้ {fmt(sum)})</div>
          )}
          <div className="grid2" style={{marginTop:12}}>
            <button className="btn outline" disabled={busy} onClick={()=>{ setSplitMode(false); setGoodQty(""); setBadQty(""); }}>ยกเลิก</button>
            <button className="btn" disabled={busy || !validSplit} onClick={confirmSplit}>{busy?"กำลังบันทึก...":"ยืนยันแยก"}</button>
          </div>
        </>
      )}
    </div>
  );
}

function SortStage({ lots, reload, toast }){
  if (!lots.length) return <div className="empty">ไม่มีรายการรอแยกดี/เสีย 🎉</div>;
  return (
    <div className="card-grid">
      {lots.map(lot=> <SortCard key={lot.id} lot={lot} reload={reload} toast={toast} />)}
    </div>
  );
}

/* ============================================================
   ขั้น 3: ผู้รับเหมายางดีคัด (รับ/ปฏิเสธ พร้อมรูปถ้าปฏิเสธ)
   ============================================================ */
function GoodDecisionModal({ lot, onClose, onDone, toast }){
  const remaining = lot.qty_received - n(lot.qty_sold_good) - n(lot.qty_rejected);
  const [accepted, setAccepted] = useState("");
  const [rejected, setRejected] = useState("");
  const [note, setNote] = useState("");
  const [files, setFiles] = useState([]);
  const [saving, setSaving] = useState(false);

  const acceptNow = n(accepted);
  const rejectNow = n(rejected);
  const sum = acceptNow + rejectNow;
  const valid = sum > 0 && sum <= remaining;
  const hasReject = rejectNow > 0;
  const willRemain = remaining - sum;

  const onPickFiles = (e) => setFiles(Array.from(e.target.files || []).slice(0,4));

  const submit = async () => {
    if (!valid) { toast(`กรอกจำนวนให้ถูกต้อง (ไม่เกิน ${remaining} เส้นที่เหลือ)`); return; }
    if (hasReject && files.length === 0) { toast("กรุณาถ่ายรูปยางที่ถูกปฏิเสธ"); return; }
    setSaving(true);
    try {
      let photos = [];
      if (hasReject && files.length){
        for (const file of files){
          const blob = await compressImage(file);
          const path = `${lot.branch}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
          const { error } = await supa.storage.from(BUCKET).upload(path, blob, { contentType:"image/jpeg" });
          if (error) throw error;
          const { data } = supa.storage.from(BUCKET).getPublicUrl(path);
          photos.push({ url: data.publicUrl, path });
        }
      }
      const newSoldGood = n(lot.qty_sold_good) + acceptNow;
      const newRejected = n(lot.qty_rejected) + rejectNow;
      const newRemaining = lot.qty_received - newSoldGood - newRejected;

      const { error: e1 } = await supa.from(TABLE).update({
        status: newRemaining <= 0 ? "good_done" : "good_pending",
        qty_sold_good: newSoldGood,
        qty_rejected: newRejected,
        reject_note: hasReject ? note.trim() : lot.reject_note,
        reject_photos: hasReject ? photos : (lot.reject_photos || []),
        good_decided_at: new Date().toISOString()
      }).eq("id", lot.id);
      if (e1) throw e1;

      if (hasReject){
        const today = todayStr();
        const { error: e2 } = await supa.from(TABLE).insert([{
          record_date: today,
          month_key: monthKeyOf(today),
          branch: lot.branch,
          tire_size: lot.tire_size,
          brand: lot.brand,
          qty_total_intake: rejectNow,
          qty_customer_back: 0,
          qty_received: rejectNow,
          side: "bad",
          status: "bad_pending",
          reject_note: note.trim(),
          reject_photos: photos,
          parent_lot_id: lot.id,
          sorted_at: new Date().toISOString()
        }]);
        if (e2) throw e2;
      }
      toast(newRemaining <= 0 ? "บันทึกผลครบแล้ว ✓" : `บันทึกแล้ว ✓ — เหลืออีก ${fmt(newRemaining)} เส้นรอครั้งถัดไป`);
      onDone();
    } catch(err){ console.error(err); toast("ผิดพลาด: "+(err.message||"")); }
    finally { setSaving(false); }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <h3>{lot.tire_size} <span className="small">{lot.brand}</span></h3>
        <div className="small">สาขา {lot.branch} · เหลือรอตัดสิน {fmt(remaining)} เส้น (จากทั้งชุด {fmt(lot.qty_received)} เส้น)</div>
        {(n(lot.qty_sold_good)>0 || n(lot.qty_rejected)>0) && (
          <div className="small" style={{marginTop:4}}>
            ผ่านมาแล้ว: รับซื้อ {fmt(n(lot.qty_sold_good))} · ปฏิเสธ {fmt(n(lot.qty_rejected))} เส้น
          </div>
        )}

        <div className="grid2" style={{marginTop:10}}>
          <div>
            <label>ผู้รับเหมารับซื้อ (ครั้งนี้)</label>
            <input type="number" inputMode="numeric" min="0" max={remaining} placeholder="0" value={accepted} onChange={e=>setAccepted(e.target.value)} />
          </div>
          <div>
            <label>ผู้รับเหมาปฏิเสธ (ครั้งนี้)</label>
            <input type="number" inputMode="numeric" min="0" max={remaining} placeholder="0" value={rejected} onChange={e=>setRejected(e.target.value)} />
          </div>
        </div>
        {sum > remaining && <div className="note">⚠️ กรอกรวมกันเกินจำนวนที่เหลือ ({fmt(remaining)} เส้น)</div>}
        {sum > 0 && sum <= remaining && willRemain > 0 && (
          <div className="note" style={{background:"#eff6ff", borderColor:"#bfdbfe", color:"#1e40af"}}>
            ผู้รับเหมาเอาไปไม่หมด — จะเหลือ {fmt(willRemain)} เส้น รอผู้รับเหมามาคัดต่อในครั้งถัดไป
          </div>
        )}

        {hasReject && (
          <>
            <div className="note">⚠️ ยางที่ถูกปฏิเสธ {fmt(rejectNow)} เส้น จะถูกย้ายไปรอผู้รับเหมายางเสียอัตโนมัติ</div>
            <label>หมายเหตุ เหตุผลที่ไม่รับซื้อ</label>
            <textarea placeholder="เช่น ดอกยางต่างกัน, ยี่ห้อไม่ตรง, สภาพไม่ผ่านเกณฑ์..." value={note} onChange={e=>setNote(e.target.value)} />
            <label>รูปถ่ายยางที่ถูกปฏิเสธ (สูงสุด 4 รูป) <span className="req">*</span></label>
            <label className="photo-input">
              📷 {files.length ? `เลือกแล้ว ${files.length} รูป` : "แตะเพื่อถ่าย / เลือกรูป"}
              <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={onPickFiles} />
            </label>
            {files.length>0 && (
              <div className="thumbs">
                {files.map((file,i)=>(<img key={i} src={URL.createObjectURL(file)} alt="" />))}
              </div>
            )}
          </>
        )}

        <div className="grid2" style={{marginTop:16}}>
          <button className="btn outline" onClick={onClose}>ยกเลิก</button>
          <button className="btn" disabled={saving || !valid} onClick={submit}>{saving?"กำลังบันทึก...":"ยืนยันผล"}</button>
        </div>
      </div>
    </div>
  );
}

function GoodContractorStage({ lots, reload, toast }){
  const [active, setActive] = useState(null);

  return (

      {lots.map(lot=>{
        const remaining = lot.qty_received - n(lot.qty_sold_good) - n(lot.qty_rejected);

        return (
          <div className="lotcard" key={lot.id} onClick={()=>setActive(lot)} style={{cursor:"pointer"}}>
            <div className="top">
              <div>
                <div className="size">{lot.tire_size} <span className="small">{lot.brand}</span></div>
                <div className="meta">สาขา {lot.branch} · {lot.record_date}</div>
              </div>
              <span className="status-badge sb-good_pending">รอคัด</span>
            </div>
            <div className="qty">{fmt(remaining)} เส้น <span className="small" style={{fontWeight:400}}>เหลือรอตัดสิน</span></div>
            {hasProgress && (
              <div className="small">จากทั้งชุด {fmt(lot.qty_received)} เส้น · รับซื้อแล้ว {fmt(n(lot.qty_sold_good))} · ปฏิเสธแล้ว {fmt(n(lot.qty_rejected))}</div>
            )}

/* ============================================================
   ขั้น 4: ผู้รับเหมายางเสียมารับ (เลือกได้หลายชุด)
   ============================================================ */
function BadPickupCard({ lot, reload, toast }){
  const remaining = n(lot.qty_received) - n(lot.qty_sold_bad);
  const [busy, setBusy] = useState(false);
  const [qtyMode, setQtyMode] = useState(false);
  const [qty, setQty] = useState("");

  const commit = async (takeQty) => {
    if (takeQty <= 0 || takeQty > remaining) { toast(`จำนวนต้องอยู่ระหว่าง 1 ถึง ${remaining} เส้น`); return; }
    setBusy(true);
    try {
      const newSoldBad = n(lot.qty_sold_bad) + takeQty;
      const newRemaining = n(lot.qty_received) - newSoldBad;
      const { error } = await supa.from(TABLE).update({
        qty_sold_bad: newSoldBad,
        status: newRemaining <= 0 ? "sold_bad" : "bad_pending",
        collected_at: new Date().toISOString()
      }).eq("id", lot.id);
      if (error) throw error;
      toast(newRemaining <= 0 ? "รับครบแล้ว ✓" : `บันทึกแล้ว ✓ — เหลืออีก ${fmt(newRemaining)} เส้น`);
      setQtyMode(false); setQty("");
      reload();
    } catch(err){ console.error(err); toast("ผิดพลาด: "+(err.message||"")); }
    finally { setBusy(false); }
  };

  return (
    <div className="lotcard">
      <div className="top">
        <div>
          <div className="size">{lot.tire_size} <span className="small">{lot.brand}</span></div>
          <div className="meta">สาขา {lot.branch} · {lot.record_date}{lot.parent_lot_id ? " · (มาจากยางดีที่ถูกปฏิเสธ)" : ""}{lot.from_deposit_id ? " · (มาจากยางฝากไม่มารับ)" : ""}</div>
        </div>
        <span className="status-badge sb-bad_pending">รอผู้รับเหมา</span>
      </div>
      <div className="qty">{fmt(remaining)} เส้น <span className="small" style={{fontWeight:400}}>เหลือรอรับ</span></div>
      {n(lot.qty_sold_bad)>0 && <div className="small">จากทั้งชุด {fmt(lot.qty_received)} เส้น · รับไปแล้ว {fmt(n(lot.qty_sold_bad))} เส้น</div>}

      {!qtyMode ? (
        <>
          <div className="actions">
            <button className="btn-good" disabled={busy} onClick={()=>commit(remaining)}>✅ รับไปทั้งหมด ({fmt(remaining)} เส้น)</button>
          </div>
          <button className="linkbtn" style={{width:"100%", marginTop:4}} onClick={()=>setQtyMode(true)}>
            🔢 ระบุจำนวน (รับไม่ครบ)
          </button>
        </>
      ) : (
        <>
          <div className="grid2" style={{marginTop:10}}>
            <div>
              <label>จำนวนที่รับไปครั้งนี้</label>
              <input type="number" inputMode="numeric" min="1" max={remaining} placeholder={`สูงสุด ${remaining}`} value={qty} onChange={e=>setQty(e.target.value)} />
            </div>
            <div />
          </div>
          <div className="grid2" style={{marginTop:12}}>
            <button className="btn outline" disabled={busy} onClick={()=>{ setQtyMode(false); setQty(""); }}>ยกเลิก</button>
            <button className="btn" disabled={busy || n(qty)<=0 || n(qty)>remaining} onClick={()=>commit(n(qty))}>{busy?"กำลังบันทึก...":"ยืนยัน"}</button>
          </div>
        </>
      )}
    </div>
  );
}

function BadContractorStage({ lots, reload, toast }){
  if (!lots.length) return <div className="empty">ไม่มียางรอผู้รับเหมายางเสียมารับ 🎉</div>;
  return (
    <div className="card-grid">
      {lots.map(lot => <BadPickupCard key={lot.id} lot={lot} reload={reload} toast={toast} />)}
    </div>
  );
}

/* ============================================================
   หน้า "งาน" — รวม 4 ขั้นตอนไว้ในที่เดียว ด้วย segmented tabs
   ============================================================ */
function WorkScreen({ lots, reload, toast, lockedBranch }){
  const [localBranch, setLocalBranch] = useState("");
  const branch = lockedBranch || localBranch;
  const [stage, setStage] = useState("intake");

  const byBranch = (arr) => branch ? arr.filter(l=>l.branch===branch) : arr;
  const received   = byBranch(lots.filter(l=>l.status==="received"));
  const goodPending = byBranch(lots.filter(l=>l.status==="good_pending"));
  const badPending  = byBranch(lots.filter(l=>l.status==="bad_pending"));

  const tabs = [
    { k:"intake", l:"รับเข้าใหม่" },
    { k:"sort",   l:"แยกดี/เสีย", cnt: received.length },
    { k:"good",   l:"ผู้รับเหมาดี", cnt: goodPending.length },
    { k:"bad",    l:"ผู้รับเหมาเสีย", cnt: badPending.length },
  ];

  return (
    <div className="wrap">
      <div className="card" style={{paddingBottom:6}}>
        <label style={{marginTop:0}}>
          กรองดูเฉพาะสาขา {lockedBranch && <span className="small">(ล็อกอยู่ที่สาขา {lockedBranch} — เปลี่ยนได้ที่แถบเหลืองด้านบน)</span>}
        </label>
        <select value={branch} disabled={!!lockedBranch} onChange={e=>setLocalBranch(e.target.value)}>
          <option value="">ทุกสาขา</option>
          {BRANCHES.map(b=><option key={b} value={b}>สาขา {b}</option>)}
        </select>
      </div>

      <div className="seg">
        {tabs.map(t=>(
          <button key={t.k} className={stage===t.k?"active":""} onClick={()=>setStage(t.k)}>
            {t.l}{typeof t.cnt==="number" && <span className="cnt">{t.cnt}</span>}
          </button>
        ))}
      </div>

      {stage==="intake" && <IntakeForm onSaved={reload} toast={toast} defaultBranch={branch} lockedBranch={lockedBranch} />}
      {stage==="sort"   && <SortStage lots={received} reload={reload} toast={toast} />}
      {stage==="good"   && <GoodContractorStage lots={goodPending} reload={reload} toast={toast} />}
      {stage==="bad"    && <BadContractorStage lots={badPending} reload={reload} toast={toast} />}
    </div>
  );
}

/* ============================================================
   DASHBOARD
   ============================================================ */
function Dashboard({ lots, deposits, lockedBranch }){
  const months = useMemo(()=>{
    const s = new Set([...lots.map(l=>l.month_key), ...deposits.map(d=>d.month_key)]);
    return Array.from(s).sort().reverse();
  }, [lots, deposits]);
  const [localBranch, setLocalBranch] = useState("");
  const branch = lockedBranch || localBranch;
  const [month, setMonth] = useState("");

  useEffect(()=>{ if(months.length && !month) setMonth(months[0]); }, [months]);

  const filtered = lots.filter(l =>
    (!branch || l.branch===branch) && (!month || l.month_key===month)
  );
  const filteredDeposits = deposits.filter(d =>
    (!branch || d.branch===branch) && (!month || d.month_key===month)
  );

  const agg = useMemo(()=>{
    let goodRemain=0, badRemain=0, waitingSort=0, soldGood=0, soldBad=0, back=0, rejected=0, total=0;
    filtered.forEach(l=>{
      back += n(l.qty_customer_back);
      soldGood += n(l.qty_sold_good);   // สะสมทุกชุด แม้ยังตัดสินไม่ครบ
      rejected += n(l.qty_rejected);    // สะสมทุกชุด แม้ยังตัดสินไม่ครบ
      soldBad  += n(l.qty_sold_bad);    // สะสมทุกชุด แม้ยังรับไม่ครบ
      if (l.status === "received")     waitingSort += n(l.qty_received);
      if (l.status === "good_pending") goodRemain  += (n(l.qty_received) - n(l.qty_sold_good) - n(l.qty_rejected));
      if (l.status === "bad_pending")  badRemain   += (n(l.qty_received) - n(l.qty_sold_bad));
    });
    total = waitingSort + goodRemain + badRemain;
    return { total, waitingSort, goodRemain, badRemain, soldGood, soldBad, back, rejected };
  }, [filtered]);

  const depositAgg = useMemo(()=>{
    let remainingQty=0, pendingCount=0;
    filteredDeposits.forEach(d=>{
      if (d.status === "deposited"){ remainingQty += n(d.qty); pendingCount += 1; }
    });
    return { remainingQty, pendingCount };
  }, [filteredDeposits]);

  const Box = ({v,l,c}) => (
    <div className="stat" style={{background:c}}>
      <div className="v">{fmt(v)}</div><div className="l">{l}</div>
    </div>
  );

  return (
    <div className="wrap">
      <div className="card">
        <h2>📊 แดชบอร์ดสาขา</h2>
        <div className="filterbar">
          <div>
            <label style={{margin:"0 0 4px"}}>สาขา {lockedBranch && <span className="small">🔒 ล็อกอยู่</span>}</label>
            <select value={branch} disabled={!!lockedBranch} onChange={e=>setLocalBranch(e.target.value)}>
              <option value="">ทุกสาขา</option>
              {BRANCHES.map(b=><option key={b} value={b}>สาขา {b}</option>)}
            </select>
          </div>
          <div>
            <label style={{margin:"0 0 4px"}}>เดือน</label>
            <select value={month} onChange={e=>setMonth(e.target.value)}>
              <option value="">ทุกเดือน</option>
              {months.map(m=><option key={m} value={m}>{monthThai(m)}</option>)}
            </select>
          </div>
        </div>

        <div className="stat-grid">
          <Box v={agg.total}      l="ยางเก่าคงเหลือทั้งหมด" c="#111827" />
          <Box v={agg.waitingSort} l="รอแยกดี/เสีย" c="#475569" />
          <Box v={agg.goodRemain}  l="ยางเก่าสภาพดี (รอผู้รับเหมา)" c="var(--good)" />
          <Box v={agg.badRemain}   l="ยางเก่าสภาพเสีย (รอผู้รับเหมา)" c="var(--bad)" />
          <Box v={agg.soldGood}   l="ขายผู้รับเหมายางดีแล้ว" c="var(--blue)" />
          <Box v={agg.soldBad}    l="ขายผู้รับเหมายางเสียแล้ว" c="var(--purple)" />
          <Box v={agg.back}       l="ลูกค้านำกลับ" c="var(--amber)" />
          <Box v={agg.rejected}   l="ผู้รับเหมายางดีปฏิเสธ" c="#be123c" />
        </div>
      </div>

      <div className="card">
        <h2>🅿️ ยอดฝากยาง</h2>
        <div className="stat-grid">
          <Box v={depositAgg.remainingQty} l="ยอดฝากยางคงเหลือ (เส้น)" c="#0891b2" />
          <Box v={depositAgg.pendingCount} l="จำนวนรายการที่ฝากอยู่" c="#f59e0b" />
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   RECORDS LIST + DELETE BY MONTH
   ============================================================ */
function RecordsList({ lots, reload, toast, deposits, reloadDeposits, lockedBranch }){
  const [dataset, setDataset] = useState("lots"); // lots | deposits
  const [localBranch, setLocalBranch] = useState("");
  const branch = lockedBranch || localBranch;
  const [month, setMonth] = useState("");
  const [status, setStatus] = useState("");
  const [origin, setOrigin] = useState(""); // "" | rejected | from_deposit
  const [from, setFrom] = useState("");
  const [to, setTo] = useState("");
  const [lightbox, setLightbox] = useState(null);

  const months = useMemo(()=>{
    const s = new Set(lots.map(l=>l.month_key));
    return Array.from(s).sort().reverse();
  }, [lots]);

  const filtered = lots.filter(l =>
    (!branch || l.branch===branch) && (!month || l.month_key===month) && (!status || l.status===status) &&
    (!origin || (origin==="rejected" ? !!l.parent_lot_id : !!l.from_deposit_id)) &&
    (!from || l.record_date >= from) && (!to || l.record_date <= to)
  );

  const monthSummary = useMemo(()=>{
    const map = {};
    lots.forEach(l=>{ map[l.month_key]=(map[l.month_key]||0)+1; });
    return Object.entries(map).sort((a,b)=> a[0]<b[0]?1:-1);
  }, [lots]);

  const deleteMonth = async (mk, count) => {
    if (!supa) return;
    if (!confirm(`ลบข้อมูลทั้งหมดของ ${monthThai(mk)} จำนวน ${count} รายการ?\n(ลบรูปถ่ายในเดือนนี้ด้วย — กู้คืนไม่ได้)`)) return;
    try {
      const recs = lots.filter(l=>l.month_key===mk);
      const paths = recs.flatMap(l => [...(l.reject_photos||[]), ...(l.intake_photos||[])].map(p=>p.path)).filter(Boolean);
      if (paths.length) await supa.storage.from(BUCKET).remove(paths);
      const { error } = await supa.from(TABLE).delete().eq("month_key", mk);
      if (error) throw error;
      toast("ลบเดือน "+monthThai(mk)+" แล้ว");
      reload();
    } catch(err){ console.error(err); toast("ลบไม่สำเร็จ: "+(err.message||"")); }
  };

  const deleteOne = async (lot) => {
    if (!supa) return;
    if (!confirm(`ลบรายการ ${lot.tire_size} (สาขา ${lot.branch}) นี้?\n(ลบรูปถ่ายที่ติดมาด้วย — กู้คืนไม่ได้)`)) return;
    try {
      const paths = [...(lot.reject_photos||[]), ...(lot.intake_photos||[])].map(p=>p.path).filter(Boolean);
      if (paths.length) await supa.storage.from(BUCKET).remove(paths);
      const { error } = await supa.from(TABLE).delete().eq("id", lot.id);
      if (error) throw error;
      toast("ลบรายการแล้ว");
      reload();
    } catch(err){ console.error(err); toast("ลบไม่สำเร็จ: "+(err.message||"")); }
  };

  return (
    <div className="wrap">
      <div className="seg">
        <button className={dataset==="lots"?"active":""} onClick={()=>setDataset("lots")}>🛞 ยางเก่า (สต็อก)</button>
        <button className={dataset==="deposits"?"active":""} onClick={()=>setDataset("deposits")}>🅿️ ยางฝาก</button>
      </div>

      {dataset === "deposits" ? (
        <DepositList deposits={deposits} reload={reloadDeposits} toast={toast} lockedBranch={lockedBranch} />
      ) : (
      <>
      <div className="card">
        <h2>🗂️ จัดการข้อมูลรายเดือน</h2>
        {monthSummary.length===0
          ? <div className="empty">ยังไม่มีข้อมูล</div>
          : monthSummary.map(([mk,c])=>(
            <div className="monthrow" key={mk}>
              <div><b>{monthThai(mk)}</b> <span className="badge">{c} รายการ</span></div>
              <button className="btn danger" style={{width:"auto", padding:"8px 16px"}} onClick={()=>deleteMonth(mk,c)}>🗑 ลบ</button>
            </div>
          ))
        }
      </div>

      <div className="card">
        <h2>📋 ข้อมูลที่บันทึก</h2>
        <div className="filterbar">
          <select value={branch} disabled={!!lockedBranch} onChange={e=>setLocalBranch(e.target.value)}>
            <option value="">ทุกสาขา</option>
            {BRANCHES.map(b=><option key={b} value={b}>สาขา {b}</option>)}
          </select>
          <select value={month} onChange={e=>setMonth(e.target.value)}>
            <option value="">ทุกเดือน</option>
            {months.map(m=><option key={m} value={m}>{monthThai(m)}</option>)}
          </select>
        </div>
        <div className="filterbar" style={{marginBottom:12}}>
          <select value={status} onChange={e=>setStatus(e.target.value)}>
            <option value="">ทุกสถานะ</option>
            {Object.entries(STATUS_LABEL).map(([k,l])=><option key={k} value={k}>{l}</option>)}
          </select>
          <select value={origin} onChange={e=>setOrigin(e.target.value)}>
            <option value="">ทุกแหล่งที่มา</option>
            <option value="rejected">มาจากยางดีที่ถูกปฏิเสธ</option>
            <option value="from_deposit">มาจากยางฝากไม่มารับ</option>
          </select>
        </div>
        <div className="filterbar" style={{marginBottom:12}}>
          <div>
            <label style={{margin:"0 0 4px"}}>ตั้งแต่วันที่</label>
            <input type="date" value={from} onChange={e=>setFrom(e.target.value)} />
          </div>
          <div>
            <label style={{margin:"0 0 4px"}}>ถึงวันที่</label>
            <input type="date" value={to} onChange={e=>setTo(e.target.value)} />
          </div>
        </div>

        {filtered.length===0
          ? <div className="empty">ไม่พบรายการ</div>
          : (
          <div className="card-grid">
          {filtered.map(l=>(
            <div className="rec" key={l.id}>
              <div className="top">
                <div>
                  <div className="size">{l.tire_size} <span className="small">{l.brand}</span></div>
                  <div className="meta">สาขา {l.branch} · {l.record_date}{l.parent_lot_id ? " · มาจากยางดีที่ถูกปฏิเสธ" : ""}{l.from_deposit_id ? " · มาจากยางฝากไม่มารับ" : ""}</div>
                </div>
                <span className={"status-badge sb-"+l.status}>{STATUS_LABEL[l.status]}</span>
              </div>
              <div style={{textAlign:"right", marginTop:6}}>
                <button className="linkbtn" style={{color:"var(--bad)"}} onClick={()=>deleteOne(l)}>🗑 ลบรายการนี้</button>
              </div>
              <table>
                <tbody>
                  <tr><td>จำนวนสุทธิเข้าสต็อก</td><td>{fmt(n(l.qty_received))}</td></tr>
                  {n(l.qty_customer_back)>0 && <tr><td>ลูกค้านำกลับ</td><td>{fmt(n(l.qty_customer_back))}</td></tr>}
                  {l.side && <tr><td>ฝั่ง</td><td>{l.side==="good"?"ยางดี":"ยางเสีย"}</td></tr>}
                  {(n(l.qty_sold_good)>0 || n(l.qty_rejected)>0) && <tr><td>ผู้รับเหมายางดีรับซื้อ / ปฏิเสธ</td><td>{fmt(n(l.qty_sold_good))} / {fmt(n(l.qty_rejected))}</td></tr>}
                  {n(l.qty_sold_bad)>0 && <tr><td>ผู้รับเหมายางเสียรับไป</td><td>{fmt(n(l.qty_sold_bad))}</td></tr>}
                </tbody>
              </table>
              {(l.intake_photos||[]).length>0 && (
                <>
                  <div className="small" style={{marginTop:8}}>📷 รูปตอนรับเข้า</div>
                  <div className="thumbs">
                    {l.intake_photos.map((p,i)=>(<img key={i} src={p.url} alt="" onClick={()=>setLightbox(p.url)} />))}
                  </div>
                </>
              )}
              {l.reject_note && <div className="note">หมายเหตุ: {l.reject_note}</div>}
              {(l.reject_photos||[]).length>0 && (
                <div className="thumbs">
                  {l.reject_photos.map((p,i)=>(<img key={i} src={p.url} alt="" onClick={()=>setLightbox(p.url)} />))}
                </div>
              )}
            </div>
          ))}
          </div>
          )
        }
      </div>

      {lightbox && (
        <div className="lightbox" onClick={()=>setLightbox(null)}>
          <div className="x">×</div>
          <img src={lightbox} alt="" onClick={e=>e.stopPropagation()} />
        </div>
      )}
      </>
      )}
    </div>
  );
}

   ADMIN EXPORT
   ============================================================ */
function Admin({ lots, toast, deposits, lockedBranch }){
  const [dataset, setDataset] = useState("lots"); // lots | deposits

  /* ---------- ยางเก่า (สต็อก) ---------- */
  const months = useMemo(()=>{
    const s = new Set(lots.map(l=>l.month_key));
    return Array.from(s).sort().reverse();
  }, [lots]);
  const [localBranch, setLocalBranch] = useState("");
  const branch = lockedBranch || localBranch;
  const [month, setMonth] = useState("");
  const [status, setStatus] = useState("");
  const [origin, setOrigin] = useState("");
  const [from, setFrom] = useState("");
  const [to, setTo] = useState("");

  const filtered = lots.filter(l=>{
    if (branch && l.branch!==branch) return false;
    if (month && l.month_key!==month) return false;
    if (status && l.status!==status) return false;
    if (origin === "rejected" && !l.parent_lot_id) return false;
    if (origin === "from_deposit" && !l.from_deposit_id) return false;
    if (from && l.record_date < from) return false;
    if (to && l.record_date > to) return false;
    return true;
  });

  const exportExcel = () => {
    if (!filtered.length){ toast("ไม่มีข้อมูลให้ส่งออก"); return; }
    const rows = filtered.map(l=>({
      "วันที่รับเข้า": l.record_date,
      "สาขา": l.branch,
      "ขนาดยาง": l.tire_size,
      "ยี่ห้อ": l.brand,
      "รับจากลูกค้า": n(l.qty_total_intake),
      "ลูกค้านำกลับ": n(l.qty_customer_back),
      "เข้าสต็อกสุทธิ": n(l.qty_received),
      "ฝั่ง": l.side==="good"?"ดี":(l.side==="bad"?"เสีย":""),
      "สถานะ": STATUS_LABEL[l.status] || l.status,
      "ผู้รับเหมายางดีรับซื้อ": n(l.qty_sold_good),
      "ผู้รับเหมายางดีปฏิเสธ": n(l.qty_rejected),
      "ผู้รับเหมายางเสียรับไป": n(l.qty_sold_bad),
      "มาจากการปฏิเสธ (lot เดิม)": l.parent_lot_id ? "ใช่" : "",
      "มาจากยางฝากไม่มารับ": l.from_deposit_id ? "ใช่" : "",
      "หมายเหตุ": l.reject_note || "",
      "จำนวนรูปตอนรับเข้า": (l.intake_photos||[]).length,
      "ลิงก์รูปตอนรับเข้า": (l.intake_photos||[]).map(p=>p.url).join(" , "),
      "จำนวนรูปปฏิเสธ": (l.reject_photos||[]).length,
      "ลิงก์รูปปฏิเสธ": (l.reject_photos||[]).map(p=>p.url).join(" , ")

    const ws = XLSX.utils.json_to_sheet(rows);
    ws["!cols"] = Object.keys(rows[0]).map(k=>({ wch: Math.max(12, k.length+2) }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "รายงานยางเก่า");

    XLSX.writeFile(wb, `รายงานยางเก่า_${tag}_${todayStr()}.xlsx`);
    toast("ส่งออก Excel แล้ว ✓");
  };

  /* ---------- ยางฝาก ---------- */

    const s = new Set(deposits.map(d=>d.month_key));

            onClick={()=>{ setDLocalBranch(""); setDMonth(""); setDStatus(""); setDFrom(""); setDTo(""); }}>ล้างตัวกรอง</button>
        </div>
        <button className="btn green" onClick={exportDepositsExcel}>📥 ดาวน์โหลดไฟล์ Excel</button>
      </div>
      )}
    </div>
  );
}

const DEPOSIT_TABLE = "tire_deposits";

function DepositForm({ onSaved, toast, defaultBranch, lockedBranch }){
  const blank = {
    branch: lockedBranch || defaultBranch || "", deposit_date: todayStr(),
    customer_name:"", phone:"", plate_number:"", plate_province:"", tire_size:"", brand:"", qty:"", note:""
  };
  const [f, setF] = useState(blank);
  const [files, setFiles] = useState([]);
  const [saving, setSaving] = useState(false);
  const set = (k,v) => setF(p => ({...p, [k]:v}));
  const onPickFiles = (e) => setFiles(Array.from(e.target.files || []).slice(0,4));

  useEffect(()=>{ if (lockedBranch) set("branch", lockedBranch); }, [lockedBranch]);

  const submit = async () => {
    if (!supa) { toast("ยังไม่ได้ตั้งค่า Supabase"); return; }
    if (!f.branch) { toast("กรุณาเลือกสาขา"); return; }
    if (!f.customer_name.trim()) { toast("กรุณากรอกชื่อลูกค้า"); return; }
    if (!f.plate_number.trim()) { toast("กรุณากรอกทะเบียนรถ"); return; }
    if (!f.plate_province.trim()) { toast("กรุณากรอกจังหวัด"); return; }
    if (n(f.qty) <= 0) { toast("กรุณากรอกจำนวนเส้นที่ฝาก"); return; }
    if (files.length === 0) { toast("กรุณาถ่ายรูปยางที่รับฝาก"); return; }
    setSaving(true);
    try {
      let photos = [];
      for (const file of files){
        const blob = await compressImage(file);
        const path = `deposits/${f.branch}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
        const { error } = await supa.storage.from(BUCKET).upload(path, blob, { contentType:"image/jpeg" });
        if (error) throw error;
        const { data } = supa.storage.from(BUCKET).getPublicUrl(path);
        photos.push({ url: data.publicUrl, path });
      }
      const row = {
        branch: f.branch,
        deposit_date: f.deposit_date,
        month_key: monthKeyOf(f.deposit_date),
        customer_name: f.customer_name.trim(),
        phone: f.phone.trim(),
        plate_number: f.plate_number.trim(),
        plate_province: f.plate_province.trim(),
        tire_size: f.tire_size.trim(),
        brand: f.brand.trim(),
        qty: n(f.qty),
        deposit_photos: photos,
        status: "deposited",
        note: f.note.trim()

      setFiles([]);
      onSaved && onSaved();
    } catch(err){
      console.error(err);
      toast("ผิดพลาด: " + (err.message || "บันทึกไม่สำเร็จ"));
    } finally { setSaving(false); }
  };

  return (
    <div className="card">
      <h2>🅿️ รับฝากยาง</h2>

      <label>สาขา <span className="req">*</span> {lockedBranch && <span className="small">🔒 ล็อกอยู่</span>}</label>
      <select value={f.branch} disabled={!!lockedBranch} onChange={e=>set("branch",e.target.value)}>
        <option value="">— เลือกสาขา —</option>
        {BRANCHES.map(b => <option key={b} value={b}>สาขา {b}</option>)}
      </select>

      <label>วันที่ฝาก (อัตโนมัติ)</label>

      <div className="grid2">
        <div>

        <div>

          <input placeholder="เช่น Bridgestone" value={f.brand} onChange={e=>set("brand",e.target.value)} />
        </div>
      </div>

      <div className="grid2">
        <div>
          <label>ทะเบียนรถ <span className="req">*</span></label>
          <input placeholder="เช่น กข 1234" value={f.plate_number} onChange={e=>set("plate_number",e.target.value)} />

      <label>ถ่ายรูปยางที่รับฝาก (สูงสุด 4 รูป) <span className="req">*</span></label>

      {files.length>0 && (
        <div className="thumbs">
          {files.map((file,i)=>(<img key={i} src={URL.createObjectURL(file)} alt="" />))}

        <button className="btn" disabled={saving} onClick={submit}>
          {saving ? "กำลังบันทึก..." : "บันทึกการฝาก"}

  );
}

function ConvertDepositModal({ deposit, onClose, onDone, toast }){
  const [mode, setMode] = useState("pick"); // pick | split
  const [goodQty, setGoodQty] = useState("");
  const [badQty, setBadQty] = useState("");
  const [busy, setBusy] = useState(false);

  const sum = n(goodQty) + n(badQty);
  const validSplit = sum === deposit.qty && (n(goodQty) > 0 || n(badQty) > 0);

  const insertLot = (side, qty) => ({
    record_date: todayStr(),
    month_key: monthKeyOf(todayStr()),
    branch: deposit.branch,
    tire_size: deposit.tire_size && deposit.tire_size.trim() ? deposit.tire_size : `ยางฝากไม่มารับ (${deposit.plate_number})`,
    brand: deposit.brand && deposit.brand.trim() ? deposit.brand : deposit.customer_name,
    qty_total_intake: qty,
    qty_customer_back: 0,
    qty_received: qty,
    side,
    status: side === "good" ? "good_pending" : "bad_pending",
    sorted_at: new Date().toISOString(),
    from_deposit_id: deposit.id,
    intake_photos: deposit.deposit_photos || []
  });

  const finishConvert = async () => {
    const { error } = await supa.from(DEPOSIT_TABLE).update({
      status: "moved_to_stock",
      converted_at: new Date().toISOString()
    }).eq("id", deposit.id);
    if (error) throw error;
  };

  const moveAll = async (side) => {
    setBusy(true);
    try {
      const { error } = await supa.from(TABLE).insert([insertLot(side, deposit.qty)]);
      if (error) throw error;
      await finishConvert();
      toast(side==="good" ? "ย้ายเข้าฝั่งยางดีทั้งหมด ✓" : "ย้ายเข้าฝั่งยางเสียทั้งหมด ✓");
      onDone();
    } catch(err){ console.error(err); toast("ผิดพลาด: "+(err.message||"")); }
    finally { setBusy(false); }
  };

  const moveSplit = async () => {
    if (!validSplit) { toast(`จำนวนรวมต้องเท่ากับ ${deposit.qty} เส้น`); return; }
    setBusy(true);
    try {
      const gq = n(goodQty), bq = n(badQty);
      const rows = [];
      if (gq > 0) rows.push(insertLot("good", gq));
      if (bq > 0) rows.push(insertLot("bad", bq));
      const { error } = await supa.from(TABLE).insert(rows);
      if (error) throw error;
      await finishConvert();
      toast(`ย้ายเข้าสต็อกแล้ว ✓ — ดี ${fmt(gq)} เส้น · เสีย ${fmt(bq)} เส้น`);
      onDone();
    } catch(err){ console.error(err); toast("ผิดพลาด: "+(err.message||"")); }
    finally { setBusy(false); }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <h3>📦 ย้ายเข้าสต็อก — {deposit.customer_name}</h3>
        <div className="small">{deposit.plate_number} · {deposit.plate_province} · ฝากไว้ {fmt(deposit.qty)} เส้น เมื่อ {deposit.deposit_date}</div>
        {(deposit.tire_size || deposit.brand) && (
          <div className="small">{deposit.tire_size}{deposit.tire_size && deposit.brand ? " · " : ""}{deposit.brand}</div>
        )}
        <div className="note">ลูกค้าไม่มารับยางที่ฝากไว้ ยางจะถูกย้ายเข้าสต็อกยางเก่าของสาขา</div>

        {mode === "pick" ? (
          <>
            <div className="actions" style={{marginTop:10}}>
              <button className="btn-good" disabled={busy} onClick={()=>moveAll("good")}>✅ เข้าฝั่งยางดีทั้งหมด</button>
              <button className="btn-bad" disabled={busy} onClick={()=>moveAll("bad")}>❌ เข้าฝั่งยางเสียทั้งหมด</button>
            </div>
            <button className="linkbtn" style={{width:"100%", marginTop:4}} onClick={()=>setMode("split")}>
              ✂️ แยกบางส่วน (เช่น ดี 2 เสีย 2)
            </button>
          </>
        ) : (
          <>
            <div className="grid2" style={{marginTop:10}}>
              <div>
                <label>จำนวนเข้าฝั่งดี</label>
                <input type="number" inputMode="numeric" min="0" placeholder="0" value={goodQty} onChange={e=>setGoodQty(e.target.value)} />
              </div>
              <div>
                <label>จำนวนเข้าฝั่งเสีย</label>
                <input type="number" inputMode="numeric" min="0" placeholder="0" value={badQty} onChange={e=>setBadQty(e.target.value)} />
              </div>
            </div>
            {sum !== deposit.qty && (
              <div className="note">⚠️ รวมกันต้องเท่ากับ {fmt(deposit.qty)} เส้น (ขณะนี้ {fmt(sum)})</div>
            )}
          </>
        )}

        <div className="grid2" style={{marginTop:16}}>
          <button className="btn outline" onClick={onClose}>ยกเลิก</button>
          {mode === "split" && (
            <button className="btn" disabled={busy || !validSplit} onClick={moveSplit}>{busy?"กำลังบันทึก...":"ยืนยันย้าย"}</button>
          )}
        </div>
      </div>
    </div>
  );
}

function DepositList({ deposits, reload, toast, lockedBranch }){
  const [localBranch, setLocalBranch] = useState("");
  const branch = lockedBranch || localBranch;
  const [status, setStatus] = useState("");
  const [from, setFrom] = useState("");
  const [to, setTo] = useState("");
  const [lightbox, setLightbox] = useState(null);

  const filtered = deposits.filter(d =>
    (!branch || d.branch===branch) && (!status || d.status===status) &&
    (!from || d.deposit_date >= from) && (!to || d.deposit_date <= to)
  );

  const monthSummary = useMemo(()=>{
    const map = {};
    deposits.forEach(d=>{ map[d.month_key]=(map[d.month_key]||0)+1; });
    return Object.entries(map).sort((a,b)=> a[0]<b[0]?1:-1);
  }, [deposits]);

  const deleteMonth = async (mk, count) => {
    if (!supa) return;
    if (!confirm(`ลบข้อมูลการฝากยางทั้งหมดของ ${monthThai(mk)} จำนวน ${count} รายการ?\n(ลบรูปถ่ายในเดือนนี้ด้วย — กู้คืนไม่ได้)`)) return;
    try {
      const recs = deposits.filter(d=>d.month_key===mk);
      const paths = recs.flatMap(d => [...(d.deposit_photos||[]), ...(d.pickup_photos||[])].map(p=>p.path)).filter(Boolean);
      if (paths.length) await supa.storage.from(BUCKET).remove(paths);
      const { error } = await supa.from(DEPOSIT_TABLE).delete().eq("month_key", mk);
      if (error) throw error;
      toast("ลบข้อมูลฝากยางเดือน "+monthThai(mk)+" แล้ว");
      reload && reload();
    } catch(err){ console.error(err); toast("ลบไม่สำเร็จ: "+(err.message||"")); }
  };

  const deleteOne = async (d) => {
    if (!supa) return;
    if (!confirm(`ลบรายการฝากของ ${d.customer_name} (สาขา ${d.branch}) นี้?\n(ลบรูปถ่ายที่ติดมาด้วย — กู้คืนไม่ได้)`)) return;
    try {
      const paths = [...(d.deposit_photos||[]), ...(d.pickup_photos||[])].map(p=>p.path).filter(Boolean);
      if (paths.length) await supa.storage.from(BUCKET).remove(paths);
      const { error } = await supa.from(DEPOSIT_TABLE).delete().eq("id", d.id);
      if (error) throw error;
      toast("ลบรายการแล้ว");
      reload && reload();
    } catch(err){ console.error(err); toast("ลบไม่สำเร็จ: "+(err.message||"")); }
  };

  return (
    <div>
      <div className="card">
        <h2>🗂️ จัดการข้อมูลฝากยางรายเดือน</h2>
        {monthSummary.length===0
          ? <div className="empty">ยังไม่มีข้อมูล</div>
          : monthSummary.map(([mk,c])=>(
            <div className="monthrow" key={mk}>
              <div><b>{monthThai(mk)}</b> <span className="badge">{c} รายการ</span></div>
              <button className="btn danger" style={{width:"auto", padding:"8px 16px"}} onClick={()=>deleteMonth(mk,c)}>🗑 ลบ</button>
            </div>
          ))
        }
      </div>

      <div className="card" style={{paddingBottom:6}}>
        <div className="filterbar">
          <select value={branch} disabled={!!lockedBranch} onChange={e=>setLocalBranch(e.target.value)}>
            <option value="">ทุกสาขา</option>
            {BRANCHES.map(b=><option key={b} value={b}>สาขา {b}</option>)}
          </select>
          <select value={status} onChange={e=>setStatus(e.target.value)}>
            <option value="">ทุกสถานะ</option>
            <option value="deposited">ฝากอยู่</option>
            <option value="picked_up">รับคืนแล้ว</option>
            <option value="moved_to_stock">ย้ายเข้าสต็อกแล้ว</option>
          </select>
        </div>
        <div className="filterbar">
          <div>
            <label style={{margin:"0 0 4px"}}>ตั้งแต่วันที่</label>
            <input type="date" value={from} onChange={e=>setFrom(e.target.value)} />
          </div>
          <div>
            <label style={{margin:"0 0 4px"}}>ถึงวันที่</label>
            <input type="date" value={to} onChange={e=>setTo(e.target.value)} />
          </div>
        </div>
      </div>

      {filtered.length===0
        ? <div className="empty">ไม่พบรายการ</div>
        : (
        <div className="card-grid">
        {filtered.map(d=>(
          <div className="rec" key={d.id}>
            <div className="top">
              <div>
                <div className="size">{d.customer_name}{d.tire_size ? <span className="small"> · {d.tire_size}</span> : ""}{d.brand ? <span className="small"> ({d.brand})</span> : ""}</div>
                <div className="meta">{d.plate_number} · {d.plate_province} · สาขา {d.branch}</div>
              </div>
              <span className={"status-badge "+(d.status==="deposited"?"sb-bad_pending":d.status==="picked_up"?"sb-good_done":"sb-received")}>
                {d.status==="deposited" ? "ฝากอยู่" : d.status==="picked_up" ? "รับคืนแล้ว" : "ย้ายเข้าสต็อกแล้ว"}
              </span>
            </div>
            <div style={{textAlign:"right", marginTop:6}}>
              <button className="linkbtn" style={{color:"var(--bad)"}} onClick={()=>deleteOne(d)}>🗑 ลบรายการนี้</button>
            </div>
            <table>
              <tbody>
                {d.tire_size && <tr><td>ขนาดยาง</td><td>{d.tire_size}</td></tr>}
                {d.brand && <tr><td>ยี่ห้อ</td><td>{d.brand}</td></tr>}
                <tr><td>จำนวนที่ฝาก</td><td>{fmt(d.qty)} เส้น</td></tr>
                <tr><td>วันที่ฝาก</td><td>{d.deposit_date}</td></tr>
                {d.phone && <tr><td>เบอร์โทร</td><td>{d.phone}</td></tr>}
                {d.status==="picked_up" && <tr><td>วันที่มารับ</td><td>{d.pickup_date}</td></tr>}
                {d.status==="moved_to_stock" && <tr><td>ย้ายเข้าสต็อกเมื่อ</td><td>{(d.converted_at||"").slice(0,10)}</td></tr>}
              </tbody>
            </table>
            {d.note && <div className="note">หมายเหตุ: {d.note}</div>}
            {(d.deposit_photos||[]).length>0 && (
              <>
                <div className="small" style={{marginTop:8}}>📷 รูปตอนฝาก</div>
                <div className="thumbs">{d.deposit_photos.map((p,i)=>(<img key={i} src={p.url} alt="" onClick={()=>setLightbox(p.url)} />))}</div>
              </>
            )}
            {(d.pickup_photos||[]).length>0 && (
              <>
                <div className="small" style={{marginTop:8}}>📷 รูปตอนมารับ</div>
                <div className="thumbs">{d.pickup_photos.map((p,i)=>(<img key={i} src={p.url} alt="" onClick={()=>setLightbox(p.url)} />))}</div>
              </>
            )}
          </div>
        ))}
        </div>
        )
      }

      {lightbox && (
        <div className="lightbox" onClick={()=>setLightbox(null)}>
          <div className="x">×</div>
          <img src={lightbox} alt="" onClick={e=>e.stopPropagation()} />
        </div>
      )}
    </div>
  );
}

function DepositScreen({ deposits, reload, toast, lockedBranch }){
  const [stage, setStage] = useState("new");
  const pendingCount = deposits.filter(d=>d.status==="deposited").length;
  const tabs = [
    { k:"new",  l:"ฝากใหม่" },
    { k:"pickup", l:"รอรับคืน", cnt: pendingCount },
    { k:"all",  l:"ดูทั้งหมด" },
  ];
  return (
    <div className="wrap">
      <div className="seg">
        {tabs.map(t=>(
          <button key={t.k} className={stage===t.k?"active":""} onClick={()=>setStage(t.k)}>
            {t.l}{typeof t.cnt==="number" && <span className="cnt">{t.cnt}</span>}
          </button>
        ))}
      </div>
      {stage==="new"    && <DepositForm onSaved={reload} toast={toast} lockedBranch={lockedBranch} />}
      {stage==="pickup" && <PickupStage deposits={deposits} reload={reload} toast={toast} />}
      {stage==="all"    && <DepositList deposits={deposits} reload={reload} toast={toast} lockedBranch={lockedBranch} />}
    </div>
  );
}

function App(){
  const [tab, setTab] = useState("work");
  const [lots, setLots] = useState([]);
  const [deposits, setDeposits] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, toastNode] = useToast();
  const [lockedBranch, setLockedBranch] = useState(""); // ล็อกสาขาใช้ร่วมกันทุกหน้า (ป้องกันเลือกผิด)

  const reload = useCallback(async ()=>{
    if (!supa){ setLoading(false); return; }
    setLoading(true);
    const { data, error } = await supa.from(TABLE).select("*").order("record_date",{ascending:false}).order("created_at",{ascending:false});
    if (error){ console.error(error); toast("โหลดข้อมูลผิดพลาด"); }
    setLots(data || []);
    setLoading(false);
  }, [toast]);

  const reloadDeposits = useCallback(async ()=>{
    if (!supa) return;
    const { data, error } = await supa.from(DEPOSIT_TABLE).select("*").order("deposit_date",{ascending:false}).order("created_at",{ascending:false});
    if (error){ console.error(error); toast("โหลดข้อมูลฝากยางผิดพลาด"); }
    setDeposits(data || []);
  }, [toast]);

  useEffect(()=>{ reload(); reloadDeposits(); }, [reload, reloadDeposits]);

  // 🔄 Realtime sync — อัปเดตอัตโนมัติเมื่อมีการเปลี่ยนแปลงข้อมูล จากเครื่อง/สาขาอื่น

    const channel = supa.channel("tire-track-realtime")

      .on("postgres_changes", { event: "*", schema: "public", table: "tire_deposits" }, () => { reloadDeposits(); })
      .subscribe();
    return () => { supa.removeChannel(channel); };

          <div className="sub">COCKPIT · จัดการสต็อกยางเก่า 10 สาขา</div>
        </header>
        <nav className="navbar">
          {tabs.map(t=>(
            <button key={t.k} className={tab===t.k?"active":""} onClick={()=>setTab(t.k)}>
              <span className="ic">{t.ic}</span><span>{t.l}</span>
            </button>
          ))}
        </nav>
        <div className={"branchlock" + (lockedBranch ? " locked" : "")}>
          <span className="lockicon">{lockedBranch ? "🔒" : "🔓"}</span>
          <select value={lockedBranch} onChange={e=>setLockedBranch(e.target.value)}>
            <option value="">ไม่ล็อกสาขา (เลือกเองได้ทุกหน้า)</option>
            {BRANCHES.map(b=><option key={b} value={b}>ล็อกสาขา {b}</option>)}
          </select>
        </div>
      </div>

      {!supa && (
        <div className="banner">
          ⚠️ <b>ยังไม่ได้ตั้งค่า Supabase</b><br/>
          เปิดไฟล์ <code>index.html</code> แล้วใส่ค่า <code>SUPABASE_URL</code> และ <code>SUPABASE_ANON_KEY</code> ที่ส่วนบนของสคริปต์
        </div>
      )}

      {loading && supa
        ? <div className="empty" style={{paddingTop:40}}>กำลังโหลด...</div>
        : (
          <>
            {tab==="work"    && <WorkScreen lots={lots} reload={reload} toast={toast} lockedBranch={lockedBranch} />}
            {tab==="deposit" && <DepositScreen deposits={deposits} reload={reloadDeposits} toast={toast} lockedBranch={lockedBranch} />}
            {tab==="dash"    && <Dashboard lots={lots} deposits={deposits} lockedBranch={lockedBranch} />}
            {tab==="list"    && <RecordsList lots={lots} reload={reload} toast={toast} deposits={deposits} reloadDeposits={reloadDeposits} lockedBranch={lockedBranch} />}
            {tab==="admin"   && <Admin lots={lots} toast={toast} deposits={deposits} lockedBranch={lockedBranch} />}
          </>
        )
      }

      {toastNode}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  document.getElementById("root").setAttribute("data-mounted", "1");
} catch (err) {
  console.error(err);
  window.showFatalError("Render Error: " + (err && err.message ? err.message : String(err)));
}
</script>
</body>
</html>
